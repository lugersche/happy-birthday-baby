<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Allen 💙</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:#081229;
color:white;
overflow-x:hidden;
}

/* STARS */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

.star{
position:absolute;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
50%{
opacity:.2;
}
}

/* INTRO */

.intro{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.intro h1{
font-family:'Cormorant Garamond',serif;
font-size:5rem;
}

.intro p{
margin-top:15px;
font-size:1.2rem;
}

.snoopy-intro{
width:250px;
animation:walkIn 3s forwards;
position:relative;
left:-500px;
}

@keyframes walkIn{
to{
left:0;
}
}

.btn{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:18px;
font-weight:600;
}

/* SECTIONS */

.section{
padding:100px 20px;
text-align:center;
}

.section h2{
font-family:'Cormorant Garamond',serif;
font-size:3.5rem;
margin-bottom:30px;
}

/* ENVELOPE */

.envelope{
width:320px;
height:220px;
margin:auto;
background:#4f8cff;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:.5s;
}

.envelope:hover{
transform:scale(1.05);
}

#letter{
display:none;
max-width:800px;
margin:40px auto;
line-height:2;
}

/* POLAROID */

.gallery{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.polaroid{
background:white;
padding:10px;
width:280px;
color:#222;
border-radius:5px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.polaroid img{
width:100%;
display:block;
}

.polaroid p{
margin-top:10px;
font-weight:600;
}

/* CAKE */

.cake{
font-size:120px;
margin:30px 0;
}

.hidden{
display:none;
}

/* FINAL */

.final{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.final h1{
font-family:'Cormorant Garamond',serif;
font-size:6rem;
}

.final p{
font-size:1.3rem;
margin-top:20px;
}

/* HEART */

.heart{
font-size:40px;
animation:pulse 2s infinite;
margin-top:20px;
}

@keyframes pulse{
50%{
transform:scale(1.2);
}
}

/* CONFETTI */

.confetti{
position:fixed;
top:-20px;
border-radius:2px;
animation:fall linear forwards;
z-index:9999;
}

@keyframes fall{

0%{
transform:
translateY(0)
rotate(0deg);
}

100%{
transform:
translateY(120vh)
rotate(1080deg);
}

}

</style>
</head>

<body>

<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div class="stars" id="stars"></div>

<!-- INTRO -->

<section class="intro">

<img src="snoopy.png" class="snoopy-intro">

<h1>Happy Birthday Allen 💙</h1>

<p>A Special Gift Made With Love</p>

<button class="btn" onclick="openGift()">
Open Your Gift 🎁
</button>

</section>

<!-- LETTER -->

<section class="section">

<h2>A Letter For You 💌</h2>

<div class="envelope" onclick="openLetter()">
Click To Open
</div>

<div id="letter">

<p id="typewriter"></p>

</div>

</section>

<!-- GALLERY -->

<section class="section">

<h2>Our Memories 📸</h2>

<div class="gallery">

<div class="polaroid">
<img src="foto1.jpg">
<p>My Favorite Smile 💙</p>
</div>

<div class="polaroid">
<img src="foto2.jpg">
<p>Our Beautiful Memory 🤍</p>
</div>

</div>

</section>

<!-- CAKE -->

<section class="section">

<h2>Birthday Cake 🎂</h2>

<div class="cake-container">

<div id="candle" class="candle">
🕯️
</div>

<div id="cake" class="cake">
🎂
</div>

</div>

<h3 id="wish" class="hidden">
✨ Make A Wish Allen 💙 ✨
</h3>

<div id="hearts"></div>

<button class="btn" onclick="blowCandles()">
Blow The Candles
</button>

<h3 id="wish" class="hidden">
Make A Wish Allen 💙
</h3>

</section>

<!-- FINAL -->

<section class="final">

<h1>I Love You Allen 💙</h1>

<p>
Forever & Always
<br><br>
- Arya -
</p>

<div class="heart">
💙
</div>

</section>

<script>

/* STARS */

for(let i=0;i<150;i++){

let star=document.createElement('div');

star.classList.add('star');

let size=Math.random()*3;

star.style.width=size+'px';
star.style.height=size+'px';

star.style.left=Math.random()*100+'%';
star.style.top=Math.random()*100+'%';

document.getElementById('stars').appendChild(star);

}

/* MUSIC */

function openGift(){

document
.getElementById('bgm')
.play()
.catch(()=>{});

window.scrollTo({
top:window.innerHeight,
behavior:'smooth'
});

}

/* LETTER */

const text=
`To My Dearest Allen 💙

Happy Birthday, my love.

Today is a reminder of how lucky I am to have someone as wonderful as you in my life.

Thank you for being my comfort on difficult days, my happiness on ordinary days, and my favorite person every single day.

You have brought so much warmth, laughter, and love into my world.

I hope this new chapter of your life is filled with beautiful memories, good health, and endless happiness.

I love you more than words can ever explain.

Forever yours,

Arya 🤍`;

let index=0;

function openLetter(){

document.getElementById('letter').style.display='block';

typeWriter();

}

function typeWriter(){

if(index<text.length){

document
.getElementById('typewriter')
.innerHTML+=text.charAt(index);

index++;

setTimeout(typeWriter,35);

}

}

/* CAKE */

function function blowCandles(){

// lilin padam

document.getElementById("candle").innerHTML="💨";

document.getElementById("cake").style.transform=
"scale(1.2)";

const wish=
document.getElementById("wish");

wish.classList.remove("hidden");

wish.classList.add("wish-show");

// confetti besar

for(let i=0;i<350;i++){

let confetti=
document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left=
Math.random()*100+"vw";

confetti.style.top=
Math.random()*50+"vh";

confetti.style.width=
(6+Math.random()*10)+"px";

confetti.style.height=
(6+Math.random()*10)+"px";

confetti.style.background=
`hsl(${Math.random()*360},100%,60%)`;

confetti.style.animationDuration=
(2+Math.random()*3)+"s";

document.body.appendChild(confetti);

setTimeout(()=>{
confetti.remove();
},5000);

}

// hati beterbangan

for(let i=0;i<80;i++){

let heart=
document.createElement("div");

heart.innerHTML="💙";

heart.classList.add("floating-heart");

heart.style.left=
Math.random()*100+"vw";

heart.style.bottom="-50px";

heart.style.animationDuration=
(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

}

</script>

</body>
</html>
